  <script>
    (function () {
      var V = '11';
      try {
        if (localStorage.getItem('_budgetv') !== V) {
          localStorage.setItem('_budgetv', V);
          if (location.search.indexOf('_budgetv=') === -1) {
            location.replace(location.pathname + '?_budgetv=' + V + location.hash);
          }
        }
      } catch (e) {}
    })();
  </script>
